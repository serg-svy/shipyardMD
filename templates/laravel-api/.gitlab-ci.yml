# DevForge — GitLab CI/CD Pipeline
# Build happens on Runner. Production server only pulls the image.

stages:
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ---- Run tests ----
test:
  stage: test
  image: php:8.3-cli
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
  script:
    - apt-get update && apt-get install -y libpq-dev zip unzip
    - docker-php-ext-install pdo pdo_pgsql
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction
    - cp .env.example .env
    - php artisan key:generate
    - php artisan test --parallel
  only:
    - merge_requests
    - main

# ---- Build Docker image on Runner (NOT on production server) ----
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST ./backend
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - main

# ---- Deploy: server only pulls the ready image ----
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
  script:
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "
        cd /app &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $IMAGE_LATEST &&
        docker compose -f docker-compose.prod.yml up -d --no-build &&
        docker exec app_container php artisan migrate --force &&
        docker image prune -f &&
        echo 'Deploy complete'"
  only:
    - main
  environment:
    name: production
