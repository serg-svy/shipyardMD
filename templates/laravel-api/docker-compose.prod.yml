# Production docker-compose — NO build sections
# Image is built by CI Runner and pulled here

services:
  app:
    image: registry.gitlab.com/YOUR_NAMESPACE/YOUR_PROJECT:latest
    container_name: app_container
    restart: unless-stopped
    env_file: .env.production
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
      - redis
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    mem_limit: 128m
    networks:
      - app_network

  worker:
    image: registry.gitlab.com/YOUR_NAMESPACE/YOUR_PROJECT:latest
    container_name: app_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    env_file: .env.production
    mem_limit: 256m
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
